<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Login page ─────────────────────────────────────────────────────── -->
  <div id="login-page">
    <div class="login-card">
      <div class="login-logo">✦ Focus</div>
      <p class="login-tagline">Your personal productivity dashboard</p>

      <h2 class="login-title" id="login-title">Welcome back</h2>

      <form id="login-form" novalidate>
        <input id="login-email"    type="email"    placeholder="Email"    autocomplete="email"            required>
        <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required>
        <div id="login-error" class="login-error"></div>
        <button class="btn" id="login-submit" type="submit">Sign in</button>
      </form>

      <button id="login-toggle" class="login-toggle">Don't have an account? Register</button>

      <button class="btn btn-ghost btn-sm theme-toggle login-theme" title="Toggle theme">☀️</button>
    </div>
  </div>

  <!-- ── App (hidden until signed in) ──────────────────────────────────── -->
  <div id="app" style="display:none">
    <header class="header">
      <div class="header-logo">✦ Focus</div>
      <div class="header-right">
        <div id="auth-area"></div>
        <button class="btn btn-ghost btn-sm" id="customize-btn" title="Customize widgets">⊞ Customize</button>
        <button class="btn btn-ghost btn-sm theme-toggle" title="Toggle theme">☀️</button>
      </div>
    </header>

    <main class="dashboard" id="dashboard"></main>

    <!-- Customize panel -->
    <div class="customize-overlay" id="customize-panel">
      <div class="customize-drawer">
        <div class="customize-header">
          <h3>Customize widgets</h3>
          <button class="btn btn-ghost btn-sm" id="customize-close">✕</button>
        </div>
        <p class="customize-hint">Drag cards on the dashboard to reorder. Toggle visibility here.</p>
        <div id="customize-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
